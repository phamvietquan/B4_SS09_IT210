<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bước 3 - Xác nhận thông tin</title>
    <style> body { font-family: sans-serif; margin: 40px; } .box { border: 1px solid #ccc; padding: 20px; max-width: 400px; background: #f9f9f9; } </style>
</head>
<body>
<h2>Đăng ký gian hàng (Bước 3/3)</h2>
<h3>Xác nhận thông tin tổng hợp</h3>

<div class="box">
    <p><strong>Họ và tên:</strong> <span th:text="${seller.fullName}"></span></p>
    <p><strong>Email:</strong> <span th:text="${seller.email}"></span></p>
    <hr>
    <p><strong>Tên gian hàng:</strong> <span th:text="${seller.shopName}"></span></p>
    <p><strong>Địa chỉ lấy hàng:</strong> <span th:text="${seller.shopAddress}"></span></p>
</div>

<br>

<form action="/register/complete" method="post" style="display: inline-block;">
    <a href="/register/step2" style="text-decoration: none; padding: 10px; background: #ddd; color: black; display: inline-block;">Quay lại sửa</a>

    <button type="submit" style="background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin-left: 10px;">
        Hoàn tất Đăng ký
    </button>
</form>
</body>
</html>
